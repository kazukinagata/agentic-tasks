<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — List View</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }
    header { background: #1a1f2e; border-bottom: 1px solid #2d3748; padding: 16px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    header h1 { font-size: 18px; font-weight: 600; color: #a78bfa; flex: 1; }
    .filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    select, input { background: #2d3748; border: 1px solid #4a5568; color: #e2e8f0; padding: 6px 12px; border-radius: 6px; font-size: 13px; outline: none; }
    select:focus, input:focus { border-color: #7c3aed; }
    .status-bar { padding: 8px 24px; font-size: 12px; color: #718096; background: #141720; border-bottom: 1px solid #2d3748; display: flex; align-items: center; gap: 12px; }
    .sse-dot { width: 8px; height: 8px; border-radius: 50%; background: #48bb78; display: inline-block; }
    .sse-dot.disconnected { background: #fc8181; }
    main { padding: 16px 24px; }
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #2d3748; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    thead th { background: #1a1f2e; padding: 12px 14px; text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #718096; border-bottom: 1px solid #2d3748; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #1e2432; transition: background 0.1s; cursor: pointer; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1a1f2e; }
    td { padding: 11px 14px; vertical-align: top; }
    .title-cell { max-width: 280px; }
    .title-text { font-weight: 500; color: #e2e8f0; line-height: 1.4; word-break: break-word; }
    .title-desc { font-size: 12px; color: #718096; margin-top: 4px; overflow: hidden; max-height: 0; transition: max-height 0.2s; }
    tr.expanded .title-desc { max-height: 200px; }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .s-backlog  { background: #2d3748; color: #a0aec0; }
    .s-ready    { background: #1e3a5f; color: #63b3ed; }
    .s-progress { background: #3d2c00; color: #f6ad55; }
    .s-review   { background: #2d1b69; color: #b794f4; }
    .s-done     { background: #1a3a2e; color: #68d391; }
    .p-urgent { background: #3d1515; color: #fc8181; }
    .p-high   { background: #3d2415; color: #f6ad55; }
    .p-medium { background: #1a2d4a; color: #63b3ed; }
    .p-low    { background: #2d3748; color: #a0aec0; }
    .assignees { display: flex; gap: 4px; flex-wrap: wrap; }
    .avatar { width: 24px; height: 24px; border-radius: 50%; background: #4a5568; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #e2e8f0; flex-shrink: 0; }
    .tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .tag { background: #2d3748; color: #a0aec0; padding: 1px 7px; border-radius: 10px; font-size: 11px; }
    .due-date { white-space: nowrap; font-size: 13px; }
    .due-date.overdue { color: #fc8181; font-weight: 600; }
    .empty-state { text-align: center; padding: 60px 24px; color: #718096; }
    .empty-state p { font-size: 16px; margin-bottom: 8px; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #2d3748; color: #e2e8f0; padding: 10px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; border: 1px solid #4a5568; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<header>
  <h1>Tasks — List View</h1>
  <div class="filter-bar">
    <input type="text" id="search" placeholder="Search..." style="width:180px">
    <select id="filter-status">
      <option value="">All Status</option>
      <option>Backlog</option><option>Ready</option><option>In Progress</option><option>In Review</option><option>Done</option>
    </select>
    <select id="filter-priority">
      <option value="">All Priority</option>
      <option>Urgent</option><option>High</option><option>Medium</option><option>Low</option>
    </select>
    <a href="/selector.html" style="color:#a78bfa;text-decoration:none;font-size:13px">← Views</a>
  </div>
</header>
<div class="status-bar">
  <span class="sse-dot disconnected" id="sse-dot"></span>
  <span id="sse-status">Connecting...</span>
  <span id="task-count"></span>
  <span id="updated-at"></span>
</div>
<main>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Priority</th>
          <th>Assignees</th>
          <th>Due Date</th>
          <th>Tags</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="empty-state" id="empty" style="display:none">
    <p>No tasks found</p>
    <small>Adjust filters or check your Notion connection</small>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>
  let allTasks = [];
  const today = new Date().toISOString().split('T')[0];

  function statusClass(s) {
    return { Backlog:'s-backlog', Ready:'s-ready', 'In Progress':'s-progress', 'In Review':'s-review', Done:'s-done' }[s] || 's-backlog';
  }
  function priorityClass(p) {
    return { Urgent:'p-urgent', High:'p-high', Medium:'p-medium', Low:'p-low' }[p] || '';
  }
  function initials(name) {
    return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  }
  function formatDate(d) {
    if (!d) return '';
    const overdue = d < today;
    return `<span class="due-date${overdue?' overdue':''}">${d}${overdue?' ⚠':''}`;
  }

  function render() {
    const search = document.getElementById('search').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    const priority = document.getElementById('filter-priority').value;
    const filtered = allTasks.filter(t =>
      (!search || t.title.toLowerCase().includes(search) || (t.description||'').toLowerCase().includes(search)) &&
      (!status || t.status === status) &&
      (!priority || t.priority === priority)
    );
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty');
    if (filtered.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';
    tbody.innerHTML = filtered.map(t => `
      <tr onclick="copyId('${t.id}',this)" title="Click to copy ID">
        <td class="title-cell">
          <div class="title-text">${esc(t.title)}</div>
          ${t.description ? `<div class="title-desc">${esc(t.description)}</div>` : ''}
        </td>
        <td><span class="badge ${statusClass(t.status)}">${esc(t.status)}</span></td>
        <td>${t.priority ? `<span class="badge ${priorityClass(t.priority)}">${esc(t.priority)}</span>` : '<span style="color:#4a5568">—</span>'}</td>
        <td><div class="assignees">${(t.assignees||[]).map(a=>`<div class="avatar" title="${esc(a.name)}">${initials(a.name)}</div>`).join('')}</div></td>
        <td>${formatDate(t.dueDate)}</td>
        <td><div class="tags">${(t.tags||[]).map(g=>`<span class="tag">${esc(g)}</span>`).join('')}</div></td>
      </tr>`).join('');
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function copyId(id, row) {
    navigator.clipboard.writeText(id).catch(()=>{});
    const was = row.classList.contains('expanded');
    row.classList.toggle('expanded', !was);
    showToast('ID copied: ' + id.slice(0,8) + '...');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  async function fetchTasks() {
    try {
      const res = await fetch('/api/tasks');
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();
      allTasks = data.tasks || [];
      document.getElementById('task-count').textContent = `${allTasks.length} tasks`;
      document.getElementById('updated-at').textContent = data.updatedAt ? `Updated: ${new Date(data.updatedAt).toLocaleTimeString()}` : '';
      render();
    } catch(e) {
      document.getElementById('sse-status').textContent = 'Error: ' + e.message;
    }
  }

  ['search','filter-status','filter-priority'].forEach(id =>
    document.getElementById(id).addEventListener('input', render)
  );

  // SSE
  function connectSSE() {
    const dot = document.getElementById('sse-dot');
    const status = document.getElementById('sse-status');
    const es = new EventSource('/api/events');
    es.addEventListener('connected', () => {
      dot.classList.remove('disconnected');
      status.textContent = 'Live';
    });
    es.addEventListener('refresh', (e) => {
      try {
        const data = JSON.parse(e.data);
        allTasks = data.tasks || [];
        document.getElementById('task-count').textContent = `${allTasks.length} tasks`;
        document.getElementById('updated-at').textContent = data.updatedAt ? `Updated: ${new Date(data.updatedAt).toLocaleTimeString()}` : '';
        render();
      } catch(err) { fetchTasks(); }
    });
    es.onerror = () => {
      dot.classList.add('disconnected');
      status.textContent = 'Reconnecting...';
      es.close();
      setTimeout(connectSSE, 3000);
    };
  }

  fetchTasks();
  connectSSE();
</script>
</body>
</html>
