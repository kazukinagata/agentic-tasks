<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Backlog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #1a1f2e; border-bottom: 1px solid #2d3748; padding: 14px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; flex-shrink: 0; }
    header h1 { font-size: 18px; font-weight: 600; color: #a78bfa; flex: 1; }
    .filter-bar { display: flex; gap: 10px; align-items: center; }
    select, input { background: #2d3748; border: 1px solid #4a5568; color: #e2e8f0; padding: 5px 10px; border-radius: 6px; font-size: 13px; outline: none; }
    select:focus, input:focus { border-color: #7c3aed; }
    .status-bar { padding: 6px 20px; font-size: 12px; color: #718096; background: #141720; border-bottom: 1px solid #2d3748; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .sse-dot { width: 8px; height: 8px; border-radius: 50%; background: #48bb78; display: inline-block; }
    .sse-dot.disconnected { background: #fc8181; }
    .table-wrap { flex: 1; overflow: auto; padding: 16px 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { background: #141720; color: #718096; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px; border-bottom: 1px solid #2d3748; text-align: left; position: sticky; top: 0; cursor: pointer; user-select: none; white-space: nowrap; }
    thead th:hover { color: #a78bfa; }
    tbody tr { border-bottom: 1px solid #1a1f2e; transition: background 0.1s; cursor: pointer; }
    tbody tr:hover { background: #1a1f2e; }
    td { padding: 9px 12px; vertical-align: middle; }
    .order-num { color: #4a5568; font-size: 12px; font-weight: 600; text-align: right; width: 40px; }
    .task-title { color: #e2e8f0; font-weight: 500; }
    .task-title.blocked-title { color: #718096; }
    .blocked-icon { color: #fc8181; margin-right: 4px; font-style: normal; }
    .dep-chain { font-size: 11px; color: #4a9ec9; margin-top: 3px; }
    .badge { display: inline-flex; align-items: center; padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; }
    .p-urgent { color: #fc8181; background: #3d1515; }
    .p-high   { color: #f6ad55; background: #3d2415; }
    .p-medium { color: #63b3ed; background: #1a2d4a; }
    .p-low    { color: #a0aec0; background: #2d3748; }
    .s-backlog { color: #a0aec0; background: #2d3748; }
    .s-ready   { color: #63b3ed; background: #1a2d4a; }
    .score-cell { color: #a78bfa; font-weight: 600; text-align: center; }
    .executor-cell { color: #68d391; font-size: 11px; font-family: monospace; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: #4a5568; text-align: center; gap: 12px; padding: 60px; }
    .empty-state h2 { color: #718096; font-size: 20px; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #2d3748; color: #e2e8f0; padding: 10px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; border: 1px solid #4a5568; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<header>
  <h1>Product Backlog</h1>
  <div class="filter-bar">
    <input type="text" id="search" placeholder="Search..." style="width:160px">
    <select id="filter-priority">
      <option value="">All Priority</option>
      <option>Urgent</option><option>High</option><option>Medium</option><option>Low</option>
    </select>
    <select id="filter-executor">
      <option value="">All Executors</option>
      <option>claude-code</option><option>cowork</option><option>human</option>
    </select>
    <select id="filter-blocked">
      <option value="">All</option>
      <option value="unblocked">Unblocked only</option>
      <option value="blocked">Blocked only</option>
    </select>
    <a href="/selector.html" style="color:#a78bfa;text-decoration:none;font-size:13px">← Views</a>
  </div>
</header>
<div class="status-bar">
  <span class="sse-dot disconnected" id="sse-dot"></span>
  <span id="sse-status">Connecting...</span>
  <span id="task-count"></span>
</div>
<div class="table-wrap" id="table-wrap">
  <table id="backlog-table">
    <thead>
      <tr>
        <th class="order-num">#</th>
        <th>Title</th>
        <th>Priority</th>
        <th>Score</th>
        <th>Status</th>
        <th>Executor</th>
        <th>Complexity</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>
<div class="toast" id="toast"></div>

<script>
  let allTasks = [];
  const prioClass = { Urgent:'p-urgent', High:'p-high', Medium:'p-medium', Low:'p-low' };
  const statusClass = { Backlog:'s-backlog', Ready:'s-ready' };
  const prioOrder = { Urgent:0, High:1, Medium:2, Low:3, null:4 };

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildTitleMap(tasks) {
    const m = {};
    tasks.forEach(t => m[t.id] = t.title);
    return m;
  }

  function render() {
    const search = document.getElementById('search').value.toLowerCase();
    const priority = document.getElementById('filter-priority').value;
    const executor = document.getElementById('filter-executor').value;
    const blocked = document.getElementById('filter-blocked').value;

    const backlogTasks = allTasks.filter(t => !t.sprintId && (t.status === 'Backlog' || t.status === 'Ready'));
    const titleMap = buildTitleMap(allTasks);

    let filtered = backlogTasks.filter(t =>
      (!search || t.title.toLowerCase().includes(search)) &&
      (!priority || t.priority === priority) &&
      (!executor || t.executor === executor) &&
      (!blocked || (blocked === 'blocked' ? t.blockedBy.length > 0 : t.blockedBy.length === 0))
    );

    // Sort: Backlog Order (asc, null last) → Priority → Complexity Score (desc)
    filtered.sort((a, b) => {
      const ao = a.backlogOrder ?? 999999;
      const bo = b.backlogOrder ?? 999999;
      if (ao !== bo) return ao - bo;
      const ap = prioOrder[a.priority] ?? 4;
      const bp = prioOrder[b.priority] ?? 4;
      if (ap !== bp) return ap - bp;
      return (b.complexityScore || 0) - (a.complexityScore || 0);
    });

    const tbody = document.getElementById('table-body');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#4a5568;padding:40px">No backlog tasks</td></tr>';
      document.getElementById('task-count').textContent = '0 tasks';
      return;
    }

    tbody.innerHTML = filtered.map((t, i) => {
      const pc = t.priority ? prioClass[t.priority] : '';
      const sc = statusClass[t.status] || '';
      const isBlocked = t.blockedBy && t.blockedBy.length > 0;
      const depNames = (t.blockedBy || []).map(id => esc(titleMap[id] || id.slice(0,8)+'...')).join(', ');
      return `<tr onclick="openTask('${esc(t.url || '')}', '${t.id}')">
        <td class="order-num">${t.backlogOrder != null ? t.backlogOrder : (i+1)*1000}</td>
        <td>
          <div class="task-title${isBlocked?' blocked-title':''}">
            ${isBlocked ? '<i class="blocked-icon">🔒</i>' : ''}${esc(t.title)}
          </div>
          ${isBlocked ? `<div class="dep-chain">Blocked by: ${depNames}</div>` : ''}
        </td>
        <td>${t.priority ? `<span class="badge ${pc}">${esc(t.priority)}</span>` : '<span style="color:#4a5568">—</span>'}</td>
        <td class="score-cell">${t.complexityScore != null ? t.complexityScore : '—'}</td>
        <td>${`<span class="badge ${sc}">${esc(t.status)}</span>`}</td>
        <td class="executor-cell">${t.executor ? esc(t.executor) : '—'}</td>
        <td class="score-cell">${t.complexityScore != null ? renderScoreBar(t.complexityScore) : ''}</td>
      </tr>`;
    }).join('');

    document.getElementById('task-count').textContent = `${filtered.length} tasks (${backlogTasks.length} total backlog)`;
  }

  function renderScoreBar(score) {
    const max = 13;
    const pct = Math.min(score / max * 100, 100);
    const color = score <= 3 ? '#68d391' : score <= 8 ? '#f6ad55' : '#fc8181';
    return `<div style="display:flex;align-items:center;gap:6px">
      <div style="width:60px;height:5px;background:#2d3748;border-radius:3px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${color};border-radius:3px"></div>
      </div>
      <span style="font-size:10px;color:${color}">${score}</span>
    </div>`;
  }

  function openTask(url, id) {
    if (url) {
      window.open(url, '_blank');
    } else {
      navigator.clipboard.writeText(id).catch(()=>{});
      showToast('ID copied: ' + id.slice(0,8) + '...');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  async function fetchTasks() {
    try {
      const res = await fetch('/api/tasks');
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();
      allTasks = data.tasks || [];
      render();
    } catch(e) {
      document.getElementById('sse-status').textContent = 'Error: ' + e.message;
    }
  }

  ['search','filter-priority','filter-executor','filter-blocked'].forEach(id =>
    document.getElementById(id).addEventListener('input', render)
  );

  function connectSSE() {
    const dot = document.getElementById('sse-dot');
    const status = document.getElementById('sse-status');
    const es = new EventSource('/api/events');
    es.addEventListener('connected', () => {
      dot.classList.remove('disconnected');
      status.textContent = 'Live';
    });
    es.addEventListener('refresh', (e) => {
      try {
        const data = JSON.parse(e.data);
        allTasks = data.tasks || [];
        render();
      } catch(err) { fetchTasks(); }
    });
    es.onerror = () => {
      dot.classList.add('disconnected');
      status.textContent = 'Reconnecting...';
      es.close();
      setTimeout(connectSSE, 3000);
    };
  }

  fetchTasks();
  connectSSE();
</script>
</body>
</html>
