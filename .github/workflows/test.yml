name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: skills/viewing-tasks/server
        run: npm ci
      - name: Run tests
        working-directory: skills/viewing-tasks/server
        run: npm test

  version-check:
    name: Version Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if version bump is needed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD -- \
            'skills/' 'agents/' \
            ':!*.md' ':!.github/' ':!docs/')
          if [ -z "$CHANGED" ]; then
            echo "No source/skill changes — version bump not required."
            exit 0
          fi
          echo "Source/skill changes detected:"
          echo "$CHANGED"
          BASE_VER=$(git show "$BASE_SHA":.claude-plugin/plugin.json | python3 -c "
          import json, sys; print(json.load(sys.stdin)['version'])")
          HEAD_VER=$(python3 -c "
          import json
          with open('.claude-plugin/plugin.json') as f:
              print(json.load(f)['version'])")
          if [ "$BASE_VER" = "$HEAD_VER" ]; then
            echo "::error::plugin.json version ($HEAD_VER) was not updated. Bump the version when changing skills/ or agents/."
            exit 1
          fi
          echo "Version check passed: $HEAD_VER"
