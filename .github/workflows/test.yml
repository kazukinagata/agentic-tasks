name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: skills/viewing-tasks/server
        run: npm ci
      - name: Run tests
        working-directory: skills/viewing-tasks/server
        run: npm test

  version-check:
    name: Version Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if version bump is needed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD -- \
            'skills/' 'agents/' \
            ':!*.md' ':!.github/' ':!docs/')
          if [ -z "$CHANGED" ]; then
            echo "No source/skill changes — version bump not required."
            exit 0
          fi
          echo "Source/skill changes detected:"
          echo "$CHANGED"
          BASE_VER=$(git show "$BASE_SHA":.claude-plugin/plugin.json | python3 -c "
          import json, sys; print(json.load(sys.stdin)['version'])")
          HEAD_VER=$(python3 -c "
          import json
          with open('.claude-plugin/plugin.json') as f:
              print(json.load(f)['version'])")
          if [ "$BASE_VER" = "$HEAD_VER" ]; then
            echo "::error::plugin.json version ($HEAD_VER) was not updated. Bump the version when changing skills/ or agents/."
            exit 1
          fi
          echo "Plugin version check passed: $HEAD_VER"

      - name: Check if extension version bump is needed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          EXT_DIR="skills/providers/notion/extension"
          CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD -- \
            "$EXT_DIR/" ':!*.md')
          if [ -z "$CHANGED" ]; then
            echo "No extension changes — version bump not required."
            exit 0
          fi
          echo "Extension changes detected:"
          echo "$CHANGED"
          EXT_MANIFEST="$EXT_DIR/manifest.json"
          EXT_PKG="$EXT_DIR/package.json"
          BASE_M_VER=$(git show "$BASE_SHA":"$EXT_MANIFEST" 2>/dev/null | python3 -c "
          import json, sys; print(json.load(sys.stdin)['version'])" 2>/dev/null || echo "NEW")
          HEAD_M_VER=$(python3 -c "
          import json
          with open('$EXT_MANIFEST') as f:
              print(json.load(f)['version'])")
          BASE_P_VER=$(git show "$BASE_SHA":"$EXT_PKG" 2>/dev/null | python3 -c "
          import json, sys; print(json.load(sys.stdin)['version'])" 2>/dev/null || echo "NEW")
          HEAD_P_VER=$(python3 -c "
          import json
          with open('$EXT_PKG') as f:
              print(json.load(f)['version'])")
          if [ "$BASE_M_VER" = "NEW" ]; then
            echo "New extension — no previous version to compare."
            exit 0
          fi
          if [ "$BASE_M_VER" = "$HEAD_M_VER" ]; then
            echo "::error::Extension manifest.json version ($HEAD_M_VER) was not updated. Bump the version when changing extension files."
            exit 1
          fi
          if [ "$HEAD_M_VER" != "$HEAD_P_VER" ]; then
            echo "::error::Extension version mismatch: manifest.json=$HEAD_M_VER, package.json=$HEAD_P_VER. Keep them in sync."
            exit 1
          fi
          echo "Extension version check passed: $HEAD_M_VER"
